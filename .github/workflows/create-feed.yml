name: Create Floortrends Stock Feed

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-feed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python sync.py

      - name: Commit updated stock feed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stock.csv
          git commit -m "Update stock feed" || echo "No changes"
          git push
